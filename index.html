<!DOCTYPE html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mdprev — Premium Markdown Previewer</title>
        <meta name="description" content="A premium, lightweight, real-time Markdown previewer with syntax highlighting, live auto-save, and fluid theme controls." />
        <link rel="stylesheet" href="./style.css" />
        
        <!-- Prism Syntax Highlighting Stylesheet -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
        
        <!-- Sanitizer and Parser JS Libraries (with defer) -->
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" defer></script>
        
        <!-- Prism Core & Autoloader for dynamic syntax highlighting -->
        <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js" defer></script>
    </head>
    <body>
        <div class="app-container" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
            <!-- Header Navbar -->
            <header class="navbar">
                <div class="navbar-title">
                    <!-- Markdown Pencil Logo SVG -->
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <h1>mdprev</h1>
                </div>

                <!-- View Switcher Tabs -->
                <div class="view-btn-group">
                    <button class="view-btn active" id="view-split-btn" onclick="switchView('split')">
                        <!-- Columns/Split Icon -->
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="12" y1="3" x2="12" y2="21"></line>
                        </svg>
                        <span>Split</span>
                    </button>
                    <button class="view-btn" id="view-editor-btn" onclick="switchView('editor')">
                        <!-- Edit Pencil Icon -->
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        <span>Editor Only</span>
                    </button>
                    <button class="view-btn" id="view-preview-btn" onclick="switchView('preview')">
                        <!-- Eye / Preview Icon -->
                        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <span>Preview Only</span>
                    </button>
                </div>

                <!-- Action Controls Group -->
                <div class="actions-group">
                    <button class="btn" id="upload-btn" onclick="triggerUpload()" data-tooltip="Upload Markdown File">
                        <!-- Upload Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </button>

                    <button class="btn" onclick="copyMarkdown()" data-tooltip="Copy Raw Markdown">
                        <!-- Copy Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>

                    <button class="btn" onclick="downloadMarkdown()" data-tooltip="Download Markdown (.md)">
                        <!-- Download Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>

                    <button class="btn" onclick="copyHTML()" data-tooltip="Copy Compiled HTML">
                        <!-- Code HTML copy icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                    </button>

                    <button class="btn" onclick="downloadHTML()" data-tooltip="Export HTML File">
                        <!-- Save/Export Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                    </button>

                    <div class="toolbar-divider" style="margin: 0 0.25rem;"></div>

                    <button class="btn" onclick="clearEditor()" data-tooltip="Clear Sandbox" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">
                        <!-- Trash Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>

                    <button class="btn btn-theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" data-tooltip="Toggle Dark/Light Mode">
                        <!-- Filled in JavaScript -->
                    </button>
                </div>
            </header>

            <!-- Main Split Workspace -->
            <main class="main-content view-split" id="main-workspace">
                <!-- Editor Pane -->
                <section class="pane pane-editor">
                    <div class="pane-header">
                        <span class="pane-title">Markdown Editor</span>
                    </div>
                    <!-- Editor Quick Formatting Toolbar -->
                    <div class="editor-toolbar">
                        <button class="toolbar-btn" onclick="wrapSelection('# ', '')" data-tooltip="Header 1">
                            <span style="font-weight: 800; font-size: 0.85rem;">H1</span>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('## ', '')" data-tooltip="Header 2">
                            <span style="font-weight: 700; font-size: 0.8rem;">H2</span>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('### ', '')" data-tooltip="Header 3">
                            <span style="font-weight: 600; font-size: 0.75rem;">H3</span>
                        </button>
                        
                        <div class="toolbar-divider"></div>
                        
                        <button class="toolbar-btn" onclick="wrapSelection('**', '**')" data-tooltip="Bold Text">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('*', '*')" data-tooltip="Italic Text">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="4" x2="10" y2="4"></line>
                                <line x1="14" y1="20" x2="5" y2="20"></line>
                                <line x1="15" y1="4" x2="9" y2="20"></line>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('~~', '~~')" data-tooltip="Strikethrough">
                            <span style="text-decoration: line-through; font-weight: 600; font-size: 0.85rem; padding: 0 2px;">S</span>
                        </button>
                        
                        <div class="toolbar-divider"></div>
                        
                        <button class="toolbar-btn" onclick="wrapSelection('`', '`')" data-tooltip="Inline Code">
                            <span style="font-family: var(--editor-font); font-weight: 600; font-size: 0.8rem;">&lt;/&gt;</span>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('```\n', '\n```')" data-tooltip="Code Block">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('> ', '')" data-tooltip="Blockquote">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                        </button>
                        
                        <div class="toolbar-divider"></div>
                        
                        <button class="toolbar-btn" onclick="wrapSelection('[', '](https://)')" data-tooltip="Insert Link">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('![Alt text](', ')')" data-tooltip="Insert Image">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </button>
                        
                        <div class="toolbar-divider"></div>
                        
                        <button class="toolbar-btn" onclick="wrapSelection('- ', '')" data-tooltip="Unordered List">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <circle cx="3" cy="6" r="1"></circle>
                                <circle cx="3" cy="12" r="1"></circle>
                                <circle cx="3" cy="18" r="1"></circle>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('1. ', '')" data-tooltip="Ordered List">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="10" y1="6" x2="21" y2="6"></line>
                                <line x1="10" y1="12" x2="21" y2="12"></line>
                                <line x1="10" y1="18" x2="21" y2="18"></line>
                                <path d="M4 6h1v4"></path>
                                <path d="M4 10h2"></path>
                                <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('- [ ] ', '')" data-tooltip="Task Checklist">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <polyline points="9 11 12 14 22 4"></polyline>
                            </svg>
                        </button>
                        
                        <div class="toolbar-divider"></div>
                        
                        <button class="toolbar-btn" onclick="wrapSelection('| Header | Header |\n| --- | --- |\n| Cell | Cell |\n', '')" data-tooltip="Insert Table">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" fill="none"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="3" y1="15" x2="21" y2="15"></line>
                                <line x1="9" y1="3" x2="9" y2="21"></line>
                                <line x1="15" y1="3" x2="15" y2="21"></line>
                            </svg>
                        </button>
                        <button class="toolbar-btn" onclick="wrapSelection('---\n', '')" data-tooltip="Horizontal Line">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <!-- Editor Input Textarea -->
                    <div class="textarea-wrapper">
                        <textarea class="editor-textarea" id="input-area" placeholder="Write markdown content here... (Drag-and-drop .md files to import them!)"></textarea>
                    </div>
                </section>

                <!-- Preview Pane -->
                <section class="pane pane-preview">
                    <div class="pane-header">
                        <span class="pane-title">Markdown Preview</span>
                    </div>
                    <!-- Preview Render Panel -->
                    <div class="preview-body markdown-body" id="output-area"></div>
                </section>
            </main>

            <!-- Status Bar Footer -->
            <footer class="statusbar">
                <div class="stats-group">
                    <span id="word-count">0 words</span>
                    <span id="char-count">0 characters</span>
                    <span id="read-time">1 min read</span>
                </div>
                <div class="sync-scroll-toggle" onclick="toggleSyncScroll()">
                    <input type="checkbox" id="sync-scroll-chk" checked onclick="event.stopPropagation();" />
                    <label for="sync-scroll-chk" style="margin: 0; font-size: 0.75rem; color: var(--text-muted); cursor: pointer;">Sync Scroll</label>
                </div>
            </footer>
        </div>

        <!-- Hidden input for file imports -->
        <input type="file" id="file-input" accept=".md,.txt" />
        
        <!-- Toast container -->
        <div id="toast" class="toast"></div>

        <!-- App Controller Logic -->
        <script src="./script.js"></script>
    </body>
</html>
