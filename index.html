<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Markdown Previewer</title>
        <link rel="stylesheet" href="./style.css" />
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" defer></script>
    </head>
    <body>
        <header>
            <h1>Markdown Previewer</h1>
        </header>
        <main>
            <div id="input">
                <label for="input-area">Input</label>
                <textarea id="input-area"></textarea>
            </div>
            <div id="output">
                <label for="output-area">Output</label>
                <div id="output-area"></textarea>
            </div>
        </main>
        <script type="module">
            const input = document.getElementById('input-area');
            input.addEventListener('change', (event) => {
                const dirty = marked.parse(event.target.value);
                const clean = DOMPurify.sanitize(dirty);
                document.getElementById('output-area').innerHTML = clean;
            });
        </script>
    </body>
</html>
